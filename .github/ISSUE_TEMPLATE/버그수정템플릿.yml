name: "버그 수정"
description: "버그 수정"
labels: ["버그"]
body:
  - type: textarea
    attributes:
      label: 📄 버그 설명
      description: 버그에 대한 설명을 작성해 주세요.
      value: |
        ## 버그 내용
        어떤 문제가 발생했는지 작성해주세요.
        
        ## 재현 방법
        1.
        2.
        3.
        
        ## 기대 결과
        원래 기대했던 동작을 작성해주세요.
    validations:
      required: true
  - type: textarea
    attributes:
      label: ✅ 작업할 내용
      description: 할 일을 체크박스 형태로 작성해주세요.
      placeholder: 최대한 세분화 해서 적어주세요!
    validations:
      required: true
  - type: textarea
    attributes:
      label: 🙋🏻 참고 자료
      description: 참고 자료가 있다면 작성해 주세요.